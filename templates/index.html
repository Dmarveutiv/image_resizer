<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batman's Image Resizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #080810;
            --surface: #0f0f1a;
            --surface2: #161625;
            --border: #ffffff12;
            --border-hover: #ffffff25;
            --accent: #7c5cfc;
            --accent2: #fc5c7d;
            --accent-glow: #7c5cfc55;
            --text: #f0efff;
            --text-muted: #7b7a9a;
            --text-dim: #3d3c5a;
            --success: #4fffb0;
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; }

        .container {
            position: relative;
            z-index: 1;
            max-width: 780px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }

        .header {
            text-align: center;
            margin-bottom: 56px;
            animation: fadeUp 0.7s ease both;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #7c5cfc22, #fc5c7d22);
            border: 1px solid #7c5cfc44;
            border-radius: 100px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 500;
            color: #b09eff;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .badge::before { content: '✦'; font-size: 10px; }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(36px, 7vw, 58px);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #f0efff 30%, #7c5cfc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 14px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 300;
            line-height: 1.6;
        }

        .steps {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-bottom: 40px;
            animation: fadeUp 0.7s 0.1s ease both;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-dim);
            transition: color 0.3s;
        }
        .step.active { color: var(--text-muted); }
        .step.done { color: var(--accent); }
        .step-num {
            width: 26px; height: 26px;
            border-radius: 50%;
            border: 1px solid var(--text-dim);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
            transition: all 0.3s;
        }
        .step.active .step-num { border-color: var(--text-muted); color: var(--text-muted); }
        .step.done .step-num { border-color: var(--accent); background: var(--accent); color: white; }
        .step-line { width: 40px; height: 1px; background: var(--border); margin: 0 6px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 16px;
            animation: fadeUp 0.7s ease both;
            transition: border-color 0.3s;
        }
        .card:hover { border-color: var(--border-hover); }

        .card-label {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-label span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border);
            font-size: 10px;
            color: var(--accent);
        }

        .upload-zone {
            border: 1.5px dashed var(--border-hover);
            border-radius: var(--radius-sm);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            background: var(--surface2);
            position: relative;
            overflow: hidden;
        }
        .upload-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-glow), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); }
        .upload-zone:hover::before, .upload-zone.drag::before { opacity: 1; }

        .upload-icon {
            font-size: 32px;
            margin-bottom: 12px;
            display: block;
        }
        .upload-zone h3 {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }
        .upload-zone p {
            font-size: 13px;
            color: var(--text-muted);
        }
        .upload-zone p span {
            color: var(--accent);
            font-weight: 500;
        }

        #fileInput { display: none; }

        .preview-wrap {
            display: none;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .preview-inner {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
        }
        .preview-thumb {
            width: 56px; height: 56px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        .preview-info { flex: 1; min-width: 0; }
        .preview-name {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .preview-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .preview-remove {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .preview-remove:hover { border-color: var(--accent2); color: var(--accent2); }

        .platform-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        @media (max-width: 560px) { .platform-grid { grid-template-columns: repeat(3, 1fr); } }

        .platform-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .platform-btn:hover {
            border-color: var(--border-hover);
            background: #1a1a2e;
            transform: translateY(-2px);
        }
        .platform-btn.active {
            border-color: var(--accent);
            background: linear-gradient(135deg, #7c5cfc18, #fc5c7d10);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .platform-icon {
            font-size: 22px;
            line-height: 1;
            color: var(--text-muted);
            transition: color 0.2s;
        }
        .platform-btn:hover .platform-icon { color: var(--text); }
        .platform-btn.active .platform-icon { color: var(--accent); }

        /* Per-platform brand colors on active */
        .platform-btn.active[data-platform="instagram"] .platform-icon { color: #e1306c; }
        .platform-btn.active[data-platform="twitter"] .platform-icon { color: #fff; }
        .platform-btn.active[data-platform="facebook"] .platform-icon { color: #1877f2; }
        .platform-btn.active[data-platform="linkedin"] .platform-icon { color: #0a66c2; }
        .platform-btn.active[data-platform="youtube"] .platform-icon { color: #ff0000; }
        .platform-btn.active[data-platform="tiktok"] .platform-icon { color: #69c9d0; }
        .platform-btn.active[data-platform="pinterest"] .platform-icon { color: #e60023; }
        .platform-btn.active[data-platform="snapchat"] .platform-icon { color: #fffc00; }
        .platform-btn.active[data-platform="whatsapp"] .platform-icon { color: #25d366; }
        .platform-btn.active[data-platform="telegram"] .platform-icon { color: #2aabee; }

        .platform-name {
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }
        .platform-btn.active .platform-name { color: var(--text); }

        .use-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        @media (max-width: 480px) { .use-grid { grid-template-columns: 1fr; } }

        .use-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .use-btn:hover {
            border-color: var(--border-hover);
            transform: translateY(-1px);
        }
        .use-btn.active {
            border-color: var(--accent);
            background: linear-gradient(135deg, #7c5cfc18, transparent);
        }
        .use-name {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            display: block;
            margin-bottom: 4px;
        }
        .use-dim {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.02em;
        }
        .use-btn.active .use-dim { color: #b09eff; }

        .size-callout {
            display: none;
            background: linear-gradient(135deg, #7c5cfc15, #fc5c7d10);
            border: 1px solid #7c5cfc44;
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            align-items: center;
            gap: 14px;
            margin-top: 14px;
        }
        .size-callout-icon { font-size: 22px; flex-shrink: 0; }
        .size-callout-dim {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
        }
        .size-callout-note { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        .convert-btn {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-sm);
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            margin-top: 16px;
        }
        .convert-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, white, transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .convert-btn:hover:not(:disabled)::before { opacity: 0.08; }
        .convert-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px #7c5cfc44;
        }
        .convert-btn:active:not(:disabled) { transform: translateY(0); }
        .convert-btn:disabled {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: not-allowed;
            box-shadow: none;
        }

        .result-card {
            display: none;
            background: var(--surface);
            border: 1px solid #4fffb044;
            border-radius: var(--radius);
            padding: 24px;
            animation: fadeUp 0.5s ease both;
        }
        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .result-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #4fffb015;
            border: 1px solid #4fffb044;
            border-radius: 100px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 500;
            color: var(--success);
            font-family: 'Syne', sans-serif;
        }
        .result-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: auto;
        }
        .result-img-wrap {
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--surface2);
            border: 1px solid var(--border);
            margin-bottom: 14px;
            text-align: center;
        }
        .result-img {
            max-width: 100%;
            max-height: 300px;
            display: block;
            margin: 0 auto;
        }
        .download-btn {
            width: 100%;
            padding: 13px;
            border-radius: var(--radius-sm);
            border: 1px solid #4fffb044;
            background: #4fffb010;
            color: var(--success);
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            letter-spacing: 0.03em;
        }
        .download-btn:hover {
            background: #4fffb020;
            border-color: #4fffb088;
            transform: translateY(-1px);
        }

        canvas { display: none; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.15s; }
        .card:nth-child(4) { animation-delay: 0.2s; }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="container">

    <div class="header">
        <div class="badge">Free Image Resizer</div>
        <h1>Batman's Image Resizer</h1>
        <p class="subtitle">Resize any image to the perfect dimensions<br>for every social media platform.</p>
    </div>

    <div class="steps" id="stepsBar">
        <div class="step active" id="s1"><span class="step-num">1</span> Upload</div>
        <div class="step-line"></div>
        <div class="step" id="s2"><span class="step-num">2</span> Platform</div>
        <div class="step-line"></div>
        <div class="step" id="s3"><span class="step-num">3</span> Use Case</div>
        <div class="step-line"></div>
        <div class="step" id="s4"><span class="step-num">4</span> Export</div>
    </div>

    <!-- Step 1: Upload -->
    <div class="card" style="animation-delay:0.1s">
        <div class="card-label"><span>1</span> Upload Image</div>
        <div class="upload-zone" id="uploadZone">
            <span class="upload-icon">🖼️</span>
            <h3>Drop your image here</h3>
            <p>or <span>click to browse</span> · JPG, PNG, WEBP supported</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="preview-wrap" id="previewWrap">
            <div class="preview-inner">
                <img id="previewThumb" class="preview-thumb" src="" alt="preview">
                <div class="preview-info">
                    <div class="preview-name" id="previewName"></div>
                    <div class="preview-meta" id="previewMeta"></div>
                </div>
                <button class="preview-remove" id="removeBtn">Remove</button>
            </div>
        </div>
    </div>

    <!-- Step 2: Platform -->
    <div class="card" id="platformCard" style="animation-delay:0.15s; display:none">
        <div class="card-label"><span>2</span> Choose Platform</div>
        <div class="platform-grid" id="platformGrid"></div>
    </div>

    <!-- Step 3: Use Case -->
    <div class="card" id="useCard" style="animation-delay:0.2s; display:none">
        <div class="card-label"><span>3</span> What's it for?</div>
        <div class="use-grid" id="useGrid"></div>
        <div class="size-callout" id="sizeCallout">
            <div class="size-callout-icon">📐</div>
            <div>
                <div class="size-callout-dim" id="calloutDim"></div>
                <div class="size-callout-note" id="calloutNote"></div>
            </div>
        </div>
    </div>

    <!-- Step 4: Convert -->
    <button class="convert-btn" id="convertBtn" disabled>
        <span>✦</span> Resize & Download
    </button>

    <!-- Result -->
    <div class="result-card" id="resultCard">
        <div class="result-header">
            <div class="result-badge">✓ Resized</div>
            <div class="result-label" id="resultLabel"></div>
        </div>
        <div class="result-img-wrap">
            <img id="resultImg" class="result-img" alt="Resized image">
        </div>
        <button class="download-btn" id="downloadBtn">
            ↓ Download Image
        </button>
    </div>

    <canvas id="canvas"></canvas>
</div>

<script>
    // ─── Platform data ───────────────────────────────────────
    const platforms = {
        instagram: { name: "Instagram", icon: "fa-brands fa-instagram", uses: {
            "Feed post (square)": { w: 1080, h: 1080, note: "Classic square format" },
            "Feed post (portrait)": { w: 1080, h: 1350, note: "Best for engagement" },
            "Feed post (landscape)": { w: 1080, h: 566, note: "Widescreen crop" },
            "Story / Reel": { w: 1080, h: 1920, note: "Full screen vertical" },
            "Profile picture": { w: 320, h: 320, note: "Circular display" },
        }},
        twitter: { name: "Twitter / X", icon: "fa-brands fa-x-twitter", uses: {
            "Post image": { w: 1600, h: 900, note: "Landscape in feed" },
            "Profile picture": { w: 400, h: 400, note: "Circular display" },
            "Header / banner": { w: 1500, h: 500, note: "Profile cover" },
        }},
        facebook: { name: "Facebook", icon: "fa-brands fa-facebook", uses: {
            "Feed post": { w: 1200, h: 630, note: "Standard feed image" },
            "Cover photo": { w: 851, h: 315, note: "Page/profile banner" },
            "Profile picture": { w: 180, h: 180, note: "Circular display" },
            "Story": { w: 1080, h: 1920, note: "Full screen vertical" },
            "Event cover": { w: 1920, h: 1005, note: "Wide event banner" },
        }},
        linkedin: { name: "LinkedIn", icon: "fa-brands fa-linkedin", uses: {
            "Post image": { w: 1200, h: 627, note: "Standard feed image" },
            "Profile picture": { w: 400, h: 400, note: "Square display" },
            "Cover photo": { w: 1584, h: 396, note: "Profile banner" },
            "Company logo": { w: 300, h: 300, note: "Square logo" },
        }},
        youtube: { name: "YouTube", icon: "fa-brands fa-youtube", uses: {
            "Thumbnail": { w: 1280, h: 720, note: "16:9 video thumbnail" },
            "Channel art": { w: 2560, h: 1440, note: "Full channel banner" },
            "Profile picture": { w: 800, h: 800, note: "Circular display" },
        }},
        tiktok: { name: "TikTok", icon: "fa-brands fa-tiktok", uses: {
            "Video cover": { w: 1080, h: 1920, note: "Vertical 9:16" },
            "Profile picture": { w: 200, h: 200, note: "Circular display" },
        }},
        pinterest: { name: "Pinterest", icon: "fa-brands fa-pinterest", uses: {
            "Standard pin": { w: 1000, h: 1500, note: "2:3 ratio" },
            "Square pin": { w: 1000, h: 1000, note: "Square format" },
            "Profile picture": { w: 165, h: 165, note: "Circular display" },
        }},
        snapchat: { name: "Snapchat", icon: "fa-brands fa-snapchat", uses: {
            "Snap / Story": { w: 1080, h: 1920, note: "Full screen vertical" },
            "Ad image": { w: 1080, h: 1920, note: "9:16 vertical" },
        }},
        whatsapp: { name: "WhatsApp", icon: "fa-brands fa-whatsapp", uses: {
            "Status": { w: 1080, h: 1920, note: "Full screen vertical" },
            "Profile picture": { w: 500, h: 500, note: "Square display" },
            "Shared image": { w: 1600, h: 900, note: "Landscape format" },
        }},
        telegram: { name: "Telegram", icon: "fa-brands fa-telegram", uses: {
            "Profile picture": { w: 512, h: 512, note: "Square display" },
            "Channel banner": { w: 1280, h: 720, note: "16:9 banner" },
            "Shared image": { w: 1280, h: 720, note: "Standard share size" },
        }},
    };

    // ─── State ────────────────────────────────────────────────
    let uploadedFile = null;
    let selectedPlatform = null;
    let selectedUse = null;

    // ─── Elements ─────────────────────────────────────────────
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const previewWrap = document.getElementById('previewWrap');
    const previewThumb = document.getElementById('previewThumb');
    const previewName = document.getElementById('previewName');
    const previewMeta = document.getElementById('previewMeta');
    const removeBtn = document.getElementById('removeBtn');
    const platformCard = document.getElementById('platformCard');
    const platformGrid = document.getElementById('platformGrid');
    const useCard = document.getElementById('useCard');
    const useGrid = document.getElementById('useGrid');
    const sizeCallout = document.getElementById('sizeCallout');
    const calloutDim = document.getElementById('calloutDim');
    const calloutNote = document.getElementById('calloutNote');
    const convertBtn = document.getElementById('convertBtn');
    const resultCard = document.getElementById('resultCard');
    const resultImg = document.getElementById('resultImg');
    const resultLabel = document.getElementById('resultLabel');
    const downloadBtn = document.getElementById('downloadBtn');
    const canvas = document.getElementById('canvas');

    // ─── Steps ────────────────────────────────────────────────
    function setStep(n) {
        for (let i = 1; i <= 4; i++) {
            const el = document.getElementById('s' + i);
            el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
        }
    }

    // ─── Upload ───────────────────────────────────────────────
    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
    uploadZone.addEventListener('drop', e => {
        e.preventDefault(); uploadZone.classList.remove('drag');
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    removeBtn.addEventListener('click', () => {
        uploadedFile = null;
        fileInput.value = '';
        uploadZone.style.display = 'block';
        previewWrap.style.display = 'none';
        platformCard.style.display = 'none';
        useCard.style.display = 'none';
        resultCard.style.display = 'none';
        convertBtn.disabled = true;
        selectedPlatform = null;
        selectedUse = null;
        setStep(1);
    });

    function handleFile(file) {
        if (!file.type.startsWith('image/')) return;
        uploadedFile = file;
        const url = URL.createObjectURL(file);
        previewThumb.src = url;
        previewThumb.onload = () => {
            previewMeta.textContent = `${previewThumb.naturalWidth} × ${previewThumb.naturalHeight}px · ${(file.size/1024).toFixed(0)} KB`;
        };
        previewName.textContent = file.name;
        uploadZone.style.display = 'none';
        previewWrap.style.display = 'block';
        platformCard.style.display = 'block';
        buildPlatformGrid();
        setStep(2);
        resultCard.style.display = 'none';
    }

    // ─── Platform ─────────────────────────────────────────────
    function buildPlatformGrid() {
        platformGrid.innerHTML = '';
        Object.entries(platforms).forEach(([key, p]) => {
            const btn = document.createElement('button');
            btn.className = 'platform-btn' + (selectedPlatform === key ? ' active' : '');
            btn.setAttribute('data-platform', key);
            btn.innerHTML = `<i class="${p.icon} platform-icon"></i><span class="platform-name">${p.name}</span>`;
            btn.addEventListener('click', () => {
                selectedPlatform = key;
                selectedUse = null;
                buildPlatformGrid();
                buildUseGrid();
                useCard.style.display = 'block';
                sizeCallout.style.display = 'none';
                convertBtn.disabled = true;
                setStep(3);
                resultCard.style.display = 'none';
            });
            platformGrid.appendChild(btn);
        });
    }

    // ─── Use case ─────────────────────────────────────────────
    function buildUseGrid() {
        useGrid.innerHTML = '';
        const uses = platforms[selectedPlatform].uses;
        Object.entries(uses).forEach(([name, dim]) => {
            const btn = document.createElement('button');
            btn.className = 'use-btn' + (selectedUse === name ? ' active' : '');
            btn.innerHTML = `<span class="use-name">${name}</span><span class="use-dim">${dim.w} × ${dim.h}px</span>`;
            btn.addEventListener('click', () => {
                selectedUse = name;
                buildUseGrid();
                calloutDim.textContent = `${dim.w} × ${dim.h}px`;
                calloutNote.textContent = dim.note;
                sizeCallout.style.display = 'flex';
                convertBtn.disabled = false;
                setStep(4);
                resultCard.style.display = 'none';
            });
            useGrid.appendChild(btn);
        });
    }

    // ─── Convert ──────────────────────────────────────────────
    convertBtn.addEventListener('click', () => {
        if (!uploadedFile || !selectedPlatform || !selectedUse) return;
        const dim = platforms[selectedPlatform].uses[selectedUse];
        const img = new Image();
        img.onload = () => {
            canvas.width = dim.w;
            canvas.height = dim.h;
            const ctx = canvas.getContext('2d');
            const srcR = img.naturalWidth / img.naturalHeight;
            const dstR = dim.w / dim.h;
            let sx, sy, sw, sh;
            if (srcR > dstR) {
                sh = img.naturalHeight; sw = sh * dstR;
                sx = (img.naturalWidth - sw) / 2; sy = 0;
            } else {
                sw = img.naturalWidth; sh = sw / dstR;
                sx = 0; sy = (img.naturalHeight - sh) / 2;
            }
            ctx.drawImage(img, sx, sy, sw, sh, 0, 0, dim.w, dim.h);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
            resultImg.src = dataUrl;
            resultLabel.textContent = `${platforms[selectedPlatform].name} · ${selectedUse} · ${dim.w}×${dim.h}`;
            resultCard.style.display = 'block';
            downloadBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = dataUrl;
                const base = uploadedFile.name.replace(/\.[^.]+$/, '');
                a.download = `${base}_${selectedPlatform}_${selectedUse.replace(/[^a-z0-9]/gi,'_').toLowerCase()}.jpg`;
                a.click();
            };
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        };
        img.src = URL.createObjectURL(uploadedFile);
    });
</script>
</body>
</html>
